    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#16161d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta http-equiv="x-ua-compatible" content="IE=Edge">

  <script type="module" src="/build/app.esm.js"></script>
  <script nomodule src="/build/app.js"></script>
  <link href="/build/app.css" rel="stylesheet">

  <link rel="apple-touch-icon" href="/assets/icon/fav-svg.svg">
  <link rel="icon" type="image/svg+xml" href="/assets/icon/fav-svg.svg">

  <link rel="manifest" href="/manifest.json">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SJKW6L1DH3"></script>

<body>

  <app-root></app-root>

  <!-- 
    NETLIFY DUMMY FORMS
    Since Stencil dynamically renders the DOM using Web Components, Netlify's 
    crawler occasionally fails to map the fields of conditionally rendered forms.
    These hidden forms guarantee Netlify registers the exact schema for all forms.
  -->
  <form name="estimate-lead" data-netlify="true" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <textarea name="ai-output"></textarea>
  </form>

  <form name="contact" data-netlify="true" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="url" name="url" />
    <input type="radio" name="track" value="ai" />
    <input type="radio" name="track" value="shopify" />
    <textarea name="message"></textarea>
  </form>

  <form name="escalate" data-netlify="true" hidden>
    <input type="text" name="name" />
    <textarea name="details"></textarea>
  </form>

</body>

</html>
